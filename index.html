<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mucize Karakedi</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Mucize Karakedi</h1>
  <p>Miraculous Ladybug teorileri, analizler ve yeni bölüm içerikleri</p>
  <a class="button" href="https://www.youtube.com/channel/UCwxsT94yU2CgkJv-1Ptqpnw" target="_blank">YouTube Kanalı</a>
</header>

<section class="videos">
  <h2>Son Videolar</h2>
  <div class="video-scroll" id="video-feed">
    <!-- Videolar JS ile yüklenecek -->
  </div>
</section>

<footer>
  <p>© 2026 Mucize Karakedi</p>
</footer>

<script>
const feedURL = "https://www.youtube.com/feeds/videos.xml?channel_id=UCwxsT94yU2CgkJv-1Ptqpnw";
const videoFeed = document.getElementById("video-feed");

fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(feedURL)}`)
  .then(res => res.json())
  .then(data => {
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "application/xml");
    const entries = xml.querySelectorAll("entry");

    entries.forEach(entry => {
      const videoId = entry.querySelector("yt\\:videoId").textContent;
      const title = entry.querySelector("title").textContent;
      const thumbnail = entry.querySelector("media\\:thumbnail").getAttribute("url");

      // Dikey videoları filtrele (shorts)
      const img = new Image();
      img.src = thumbnail;
      img.onload = () => {
        if(img.width > img.height){
          const videoDiv = document.createElement("div");
          videoDiv.classList.add("video-item");
          videoDiv.innerHTML = `
            <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen title="${title}"></iframe>
          `;
          videoFeed.appendChild(videoDiv);
        }
      }
    });
  });
</script>

</body>
</html>
